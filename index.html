<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sugerencias de estrategia - DS Automobiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ds-gold: #c5a059;
            --ds-black: #0a0a0a;
            --ds-gray: #1a1a1c;
        }
        body { 
            background-color: var(--ds-black); 
            color: #e4e4e7; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-ds { font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; }
        .glass-panel {
            background: rgba(20, 20, 23, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .tyre-btn {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid rgba(0,0,0,0.5);
        }
        .tyre-btn.active { transform: scale(1.15); border-color: white; box-shadow: 0 0 15px currentColor; }
        .compound-ss { background: #ef4444; color: white; }
        .compound-s { background: #eab308; color: black; }
        .compound-m { background: #f4f4f5; color: black; }
        .compound-h { background: #f97316; color: white; }
        
        .stint-card {
            background: linear-gradient(145deg, #161618, #0a0a0a);
            border-left: 4px solid var(--ds-gold);
        }
        .nav-link.active { color: var(--ds-gold); border-bottom: 2px solid var(--ds-gold); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="relative z-10 flex flex-col h-full w-full flex-grow">
        <!-- El contenido se genera via JavaScript -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

       // CONFIGURACIÓN CON TU URL DE FIREBASE
        const firebaseConfig = {
            databaseURL: "https://ds-automobiles-f0a17-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // CIRCUITOS ENVIADOS POR EL USUARIO
        const circuitsData = {
            "AUS": { name: "Australia", laps: 58, length: 5.27, tyreWear: 18 },
            "MAL": { name: "Malasia", laps: 56, length: 5.54, tyreWear: 22 },
            "CHN": { name: "China", laps: 56, length: 5.45, tyreWear: 20 },
            "BHR": { name: "Bahréin", laps: 57, length: 5.41, tyreWear: 24 },
            "ESP": { name: "España", laps: 66, length: 4.67, tyreWear: 25 },
            "MON": { name: "Mónaco", laps: 78, length: 3.33, tyreWear: 12 },
            "CAN": { name: "Canadá", laps: 70, length: 4.36, tyreWear: 15 },
            "AUT": { name: "Austria", laps: 71, length: 4.31, tyreWear: 19 },
            "GBR": { name: "Gran Bretaña", laps: 52, length: 5.89, tyreWear: 23 },
            "HUN": { name: "Hungría", laps: 70, length: 4.38, tyreWear: 21 },
            "BEL": { name: "Bélgica", laps: 44, length: 7.00, tyreWear: 22 },
            "ITA": { name: "Italia", laps: 53, length: 5.79, tyreWear: 18 },
            "SIN": { name: "Singapur", laps: 61, length: 5.06, tyreWear: 14 },
            "JPN": { name: "Japón", laps: 53, length: 5.80, tyreWear: 23 },
            "RUS": { name: "Rusia", laps: 53, length: 5.85, tyreWear: 16 },
            "USA": { name: "EE.UU.", laps: 56, length: 5.51, tyreWear: 18 },
            "MEX": { name: "México", laps: 71, length: 4.30, tyreWear: 19 },
            "BRA": { name: "Brasil", laps: 71, length: 4.30, tyreWear: 16 },
            "UAE": { name: "Abu Dhabi", laps: 55, length: 5.28, tyreWear: 17 },
            "AZE": { name: "Azerbaiyán", laps: 51, length: 6.00, tyreWear: 15 }
        };

        let state = {
            isLoggedIn: false,
            username: '',
            section: 'strategy',
            users: {},
            messages: [],
            calc: {
                circuit: 'AUS',
                tPoints: 100,
                fPoints: 100,
                stints: [{ compound: 'M', laps: 10, boost: 'neutral' }]
            }
        };

        // FÓRMULAS ESTRATEGIA
        function getWear(track, comp, laps, pts) {
            const c = circuitsData[track];
            const baseW = (((pts/1.5)**-0.0778 * 1.43) * (0.00364 * c.tyreWear + 0.354) * (c.length * 1.384) * 150) / 100;
            const mults = { 'SS': 2.06, 'S': 1.32, 'M': 1.0, 'H': 0.65 };
            const wearPerLap = baseW * mults[comp];
            const remaining = 100 * Math.exp(-1.18 * (wearPerLap / 100) * laps);
            return remaining.toFixed(1);
        }

        function getFuel(track, pts, laps, boost) {
            const c = circuitsData[track];
            const baseF = (98.456 * Math.pow(pts, -0.088) * c.length) / 139.77;
            const bMult = { 'muy-alto': 1.05, 'alto': 1.02, 'neutral': 1, 'bajo': 0.98, 'muy-bajo': 0.95 };
            return (baseF * laps * bMult[boost]).toFixed(2);
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.isLoggedIn) {
                root.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                    <div class="glass-panel w-full max-w-sm p-10 rounded-3xl border-t-4 border-yellow-600">
                        <div class="text-center mb-10">
                            <h1 class="text-3xl font-ds font-bold text-white mb-2 tracking-widest">DS AUTOMOBILES</h1>
                            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em]">Sugerencias de estrategia</p>
                        </div>
                        <form id="loginBox" class="space-y-6">
                            <input name="user" placeholder="PILOTO" class="w-full bg-black/50 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-600 text-white">
                            <input name="pass" type="password" placeholder="CONTRASEÑA" class="w-full bg-black/50 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-600 text-white">
                            <button class="w-full bg-yellow-600 text-black font-ds font-bold py-4 rounded-xl hover:brightness-110 transition-all">INGRESAR</button>
                        </form>
                    </div>
                </div>`;
                document.getElementById('loginBox').onsubmit = (e) => {
                    e.preventDefault();
                    const u = e.target.user.value, p = e.target.pass.value;
                    if(state.users[u] && state.users[u].password === p) {
                        state.username = u; state.isLoggedIn = true; render();
                    } else alert("Credenciales incorrectas");
                };
                return;
            }

            root.innerHTML = `
            <header class="bg-black/90 border-b border-yellow-600/20 p-4 sticky top-0 z-50 backdrop-blur-md">
                <div class="max-w-7xl mx-auto flex justify-between items-center">
                    <h1 class="font-ds text-lg md:text-xl italic">DS <span class="text-yellow-600">PERFORMANCE</span></h1>
                    <nav class="flex gap-6">
                        <button onclick="window.go('strategy')" class="nav-link text-[10px] font-bold uppercase tracking-widest ${state.section==='strategy'?'active':''}">Estrategia</button>
                        <button onclick="window.go('chat')" class="nav-link text-[10px] font-bold uppercase tracking-widest ${state.section==='chat'?'active':''}">Radio</button>
                    </nav>
                    <button onclick="location.reload()" class="text-zinc-600 text-[10px] font-bold">SALIR</button>
                </div>
            </header>
            <main class="p-4 md:p-8 max-w-7xl mx-auto w-full flex-grow">
                ${state.section === 'strategy' ? renderStrategy() : renderChat()}
            </main>`;
            setupEvents();
        }

        window.go = (s) => { state.section = s; render(); };
        window.upS = (i, k, v) => { state.calc.stints[i][k] = k==='laps'?parseInt(v):v; render(); };
        window.delS = (i) => { state.calc.stints.splice(i,1); render(); };

        function renderStrategy() {
            const track = circuitsData[state.calc.circuit];
            return `
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <aside class="space-y-6">
                    <div class="glass-panel p-6 rounded-2xl">
                        <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-2">Circuito</label>
                        <select id="selTrack" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-sm mb-4">
                            ${Object.keys(circuitsData).map(k => `<option value="${k}" ${state.calc.circuit===k?'selected':''}>${circuitsData[k].name}</option>`).join('')}
                        </select>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-1">D. Neum.</label>
                                <input id="ptsT" type="number" value="${state.calc.tPoints}" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-center font-mono">
                            </div>
                            <div>
                                <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-1">D. Fuel</label>
                                <input id="ptsF" type="number" value="${state.calc.fPoints}" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-center font-mono">
                            </div>
                        </div>
                    </div>
                    <div class="p-4 rounded-2xl border border-zinc-800 bg-zinc-900/30 text-[10px] space-y-2">
                        <div class="flex justify-between"><span>Vueltas Totales:</span><span class="text-yellow-600">${track.laps}</span></div>
                        <div class="flex justify-between"><span>Longitud:</span><span>${track.length}km</span></div>
                    </div>
                </aside>
                <div class="lg:col-span-3 space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-ds uppercase">Sugerencias de estrategia</h2>
                        <button id="addStint" class="bg-yellow-600 text-black px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Añadir Stint</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${state.calc.stints.map((s, i) => {
                            const wear = getWear(state.calc.circuit, s.compound, s.laps, state.calc.tPoints);
                            const fuel = getFuel(state.calc.circuit, state.calc.fPoints, s.laps, s.boost);
                            return `
                            <div class="stint-card p-6 rounded-2xl relative overflow-hidden">
                                <div class="flex justify-between mb-4">
                                    <span class="text-[10px] font-bold text-zinc-500">STINT ${i+1}</span>
                                    <button onclick="window.delS(${i})" class="text-zinc-700 hover:text-red-500">✕</button>
                                </div>
                                <div class="flex justify-center gap-3 mb-6">
                                    ${['SS','S','M','H'].map(c => `<button onclick="window.upS(${i},'compound','${c}')" class="tyre-btn compound-${c.toLowerCase()} ${s.compound===c?'active':''}"> ${c} </button>`).join('')}
                                </div>
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <input type="number" value="${s.laps}" onchange="window.upS(${i},'laps',this.value)" class="bg-black/50 border border-zinc-800 p-3 rounded-xl text-center font-mono text-xl">
                                    <select onchange="window.upS(${i},'boost',this.value)" class="bg-black/50 border border-zinc-800 p-2 rounded-xl text-[10px] uppercase">
                                        <option value="muy-alto" ${s.boost==='muy-alto'?'selected':''}>Muy Alto</option>
                                        <option value="neutral" ${s.boost==='neutral'?'selected':''}>Neutral</option>
                                        <option value="muy-bajo" ${s.boost==='muy-bajo'?'selected':''}>Muy Bajo</option>
                                    </select>
                                </div>
                                <div class="pt-4 border-t border-zinc-800 flex justify-between">
                                    <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase">Vida Restante</p><p class="text-lg font-mono ${wear<20?'text-red-500':'text-green-500'}">${wear}%</p></div>
                                    <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase">Litros</p><p class="text-lg font-mono text-blue-400">${fuel}L</p></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderChat() {
            return `
            <div class="glass-panel rounded-3xl h-[75vh] flex flex-col overflow-hidden">
                <div class="p-4 bg-zinc-900/50 border-b border-zinc-800 flex justify-between items-center">
                    <span class="font-ds text-yellow-600 text-sm">RADIO DS PERFORMANCE</span>
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                </div>
                <div id="msgContainer" class="flex-grow p-6 overflow-y-auto space-y-4 no-scrollbar">
                    ${state.messages.map(m => `
                        <div class="flex flex-col ${m.user === state.username ? 'items-end' : 'items-start'}">
                            <span class="text-[9px] text-zinc-600 mb-1">${m.user.toUpperCase()} • ${m.time}</span>
                            <div class="bg-zinc-800/80 border border-zinc-700/50 px-4 py-2 rounded-2xl text-sm max-w-[85%]">${m.text}</div>
                        </div>
                    `).join('')}
                </div>
                <form id="chatInput" class="p-4 bg-black flex gap-2">
                    <input name="msg" placeholder="Mensaje al equipo..." class="flex-grow bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-yellow-600 text-sm">
                    <button class="bg-yellow-600 text-black px-8 rounded-2xl font-ds font-bold text-xs">ENVIAR</button>
                </form>
            </div>`;
        }

        function setupEvents() {
            const track = document.getElementById('selTrack');
            if(track) track.onchange = (e) => { state.calc.circuit = e.target.value; render(); };
            
            const add = document.getElementById('addStint');
            if(add) add.onclick = () => { state.calc.stints.push({compound:'M', laps:10, boost:'neutral'}); render(); };

            const chat = document.getElementById('chatInput');
            if(chat) chat.onsubmit = async (e) => {
                e.preventDefault();
                const text = e.target.msg.value.trim();
                if(!text) return;
                const id = Date.now();
                await set(ref(db, `messages/${id}`), {
                    user: state.username, text, timestamp: id,
                    time: new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})
                });
                e.target.msg.value = '';
            };
        }

        // FIREBASE LISTENERS
        onValue(ref(db, 'users'), (s) => { state.users = s.val() || {}; render(); });
        onValue(ref(db, 'messages'), (s) => {
            state.messages = Object.values(s.val() || {}).sort((a,b) => a.timestamp - b.timestamp);
            if(state.section === 'chat') render();
        });

        render();
    </script>
</body>
</html>
