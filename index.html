<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sugerencias de estrategia - DS Automobiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ds-gold: #c5a059;
            --ds-black: #0a0a0a;
        }
        body { 
            background-color: var(--ds-black); 
            color: #e4e4e7; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .font-ds { font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; }
        .glass-panel {
            background: rgba(20, 20, 23, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .tyre-btn {
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid rgba(0,0,0,0.6);
        }
        .tyre-btn.active { transform: scale(1.1); border-color: white; box-shadow: 0 0 15px currentColor; }
        .compound-ss { background: #ef4444; color: white; }
        .compound-s { background: #eab308; color: black; }
        .compound-m { background: #f4f4f5; color: black; }
        .compound-h { background: #f97316; color: white; }
        
        .stint-card {
            background: linear-gradient(145deg, #1a1a1c, #0d0d0e);
            border-left: 4px solid var(--ds-gold);
        }
        .nav-link.active { color: var(--ds-gold); border-bottom: 2px solid var(--ds-gold); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input, select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            transition: border 0.3s ease;
        }
        input:focus { border-color: var(--ds-gold) !important; outline: none; }
    </style>
</head>
<body class="flex flex-col">

    <div id="app" class="flex flex-col h-full w-full">
        <div class="min-h-screen flex items-center justify-center">
            <h1 class="text-2xl font-ds text-yellow-600 animate-pulse uppercase tracking-[0.5em]">DS PERFORMANCE</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            databaseURL: "https://ds-automobiles-f0a17-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // CIRCUITOS iGP MANAGER PROPORCIONADOS
        const circuitsData = {
            "AUS": { name: "Australia", laps: 58, length: 5.27, tyreWear: 18 },
            "MAL": { name: "Malasia", laps: 56, length: 5.54, tyreWear: 22 },
            "CHN": { name: "China", laps: 56, length: 5.45, tyreWear: 20 },
            "BHR": { name: "Bahréin", laps: 57, length: 5.41, tyreWear: 24 },
            "ESP": { name: "España", laps: 66, length: 4.67, tyreWear: 25 },
            "MON": { name: "Mónaco", laps: 78, length: 3.33, tyreWear: 12 },
            "CAN": { name: "Canadá", laps: 70, length: 4.36, tyreWear: 15 },
            "AUT": { name: "Austria", laps: 71, length: 4.31, tyreWear: 19 },
            "GBR": { name: "Gran Bretaña", laps: 52, length: 5.89, tyreWear: 23 },
            "HUN": { name: "Hungría", laps: 70, length: 4.38, tyreWear: 21 },
            "BEL": { name: "Bélgica", laps: 44, length: 7.00, tyreWear: 22 },
            "ITA": { name: "Italia", laps: 53, length: 5.79, tyreWear: 18 },
            "SIN": { name: "Singapur", laps: 61, length: 5.06, tyreWear: 14 },
            "JPN": { name: "Japón", laps: 53, length: 5.80, tyreWear: 23 },
            "RUS": { name: "Rusia", laps: 53, length: 5.85, tyreWear: 16 },
            "USA": { name: "EE.UU.", laps: 56, length: 5.51, tyreWear: 18 },
            "MEX": { name: "México", laps: 71, length: 4.30, tyreWear: 19 },
            "BRA": { name: "Brasil", laps: 71, length: 4.30, tyreWear: 16 },
            "UAE": { name: "Abu Dhabi", laps: 55, length: 5.28, tyreWear: 17 },
            "AZE": { name: "Azerbaiyán", laps: 51, length: 6.00, tyreWear: 15 }
        };

        let state = {
            isLoggedIn: false,
            authView: 'login', // 'login' o 'register'
            username: '',
            section: 'strategy',
            users: {},
            messages: [],
            calc: {
                circuit: 'AUS',
                tPoints: 100,
                fPoints: 100,
                stints: [{ compound: 'M', laps: 10, boost: 'neutral' }]
            }
        };

        // FÓRMULAS DE CÁLCULO
        function getWear(track, comp, laps, pts) {
            const c = circuitsData[track];
            const baseW = (((pts/1.5)**-0.0778 * 1.43) * (0.00364 * c.tyreWear + 0.354) * (c.length * 1.384) * 150) / 100;
            const mults = { 'SS': 2.06, 'S': 1.32, 'M': 1.0, 'H': 0.65 };
            const wearPerLap = baseW * mults[comp];
            const remaining = 100 * Math.exp(-1.18 * (wearPerLap / 100) * laps);
            return remaining.toFixed(1);
        }

        function getFuel(track, pts, laps, boost) {
            const c = circuitsData[track];
            const baseF = (98.456 * Math.pow(pts, -0.088) * c.length) / 139.77;
            const bMult = { 'muy-alto': 1.05, 'alto': 1.02, 'neutral': 1, 'bajo': 0.98, 'muy-bajo': 0.95 };
            return (baseF * laps * bMult[boost]).toFixed(2);
        }

        function render() {
            const root = document.getElementById('app');
            
            if (!state.isLoggedIn) {
                renderAuth(root);
                return;
            }

            root.innerHTML = `
            <header class="bg-black border-b border-zinc-800 p-4 sticky top-0 z-50">
                <div class="max-w-7xl mx-auto flex justify-between items-center">
                    <h1 class="font-ds text-lg italic tracking-tighter text-yellow-600">DS PERFORMANCE</h1>
                    <nav class="flex gap-8">
                        <button onclick="window.go('strategy')" class="nav-link text-[10px] font-bold uppercase tracking-widest ${state.section==='strategy'?'active':''}">Estrategia</button>
                        <button onclick="window.go('chat')" class="nav-link text-[10px] font-bold uppercase tracking-widest ${state.section==='chat'?'active':''}">Radio</button>
                    </nav>
                    <button onclick="location.reload()" class="text-zinc-600 text-[10px] font-bold uppercase">Salir</button>
                </div>
            </header>
            <main class="p-4 md:p-8 max-w-7xl mx-auto w-full flex-grow overflow-y-auto no-scrollbar pb-20">
                ${state.section === 'strategy' ? renderStrategy() : renderChat()}
            </main>`;
            setupEvents();
        }

        function renderAuth(root) {
            const isLogin = state.authView === 'login';
            root.innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-6 bg-black relative">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black opacity-50"></div>
                <div class="glass-panel w-full max-w-sm p-10 rounded-3xl border-t-4 border-yellow-600 relative z-10">
                    <div class="text-center mb-8">
                        <h1 class="text-3xl font-ds font-bold text-white mb-2 tracking-widest uppercase">DS Automobiles</h1>
                        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em]">${isLogin ? 'Pit Wall Login' : 'Registro de Manager'}</p>
                    </div>
                    
                    <form id="authForm" class="space-y-5">
                        <input name="user" placeholder="NOMBRE DE USUARIO" class="w-full p-4 rounded-xl text-white uppercase font-bold text-sm bg-black/40 border border-zinc-800" required>
                        <input name="pass" type="password" placeholder="CONTRASEÑA" class="w-full p-4 rounded-xl text-white text-sm bg-black/40 border border-zinc-800" required>
                        <button class="w-full bg-yellow-600 text-black font-ds font-bold py-4 rounded-xl hover:brightness-110 transition-all uppercase text-xs tracking-widest">
                            ${isLogin ? 'Entrar' : 'Crear Perfil'}
                        </button>
                    </form>

                    <div class="mt-8 text-center">
                        <button onclick="window.switchAuth()" class="text-[10px] text-zinc-500 hover:text-yellow-600 uppercase tracking-widest transition-colors font-bold">
                            ${isLogin ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión'}
                        </button>
                    </div>
                </div>
            </div>`;

            document.getElementById('authForm').onsubmit = async (e) => {
                e.preventDefault();
                const u = e.target.user.value.trim().toLowerCase();
                const p = e.target.pass.value;

                if (isLogin) {
                    // Busca en 'perfiles' según tu imagen
                    if(state.users[u] && state.users[u].password === p) {
                        state.username = u; state.isLoggedIn = true; render();
                    } else {
                        alert("Error: Usuario o contraseña incorrectos.");
                    }
                } else {
                    if (state.users[u]) {
                        alert("Este nombre de usuario ya está en uso.");
                    } else {
                        await set(ref(db, `perfiles/${u}`), { password: p, timestamp: Date.now() });
                        alert("¡Perfil creado! Ahora puedes iniciar sesión.");
                        state.authView = 'login';
                        render();
                    }
                }
            };
        }

        window.switchAuth = () => {
            state.authView = state.authView === 'login' ? 'register' : 'login';
            render();
        };

        window.go = (s) => { state.section = s; render(); };
        window.upS = (i, k, v) => { state.calc.stints[i][k] = k==='laps'?parseInt(v):v; render(); };
        window.delS = (i) => { state.calc.stints.splice(i,1); render(); };

        function renderStrategy() {
            const track = circuitsData[state.calc.circuit];
            return `
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <aside class="space-y-6">
                    <div class="glass-panel p-6 rounded-2xl">
                        <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-2 tracking-widest">G.P. Seleccionado</label>
                        <select id="selTrack" class="w-full p-3 rounded-xl text-sm mb-4 text-white bg-zinc-900 border border-zinc-800">
                            ${Object.keys(circuitsData).map(k => `<option value="${k}" ${state.calc.circuit===k?'selected':''}>${circuitsData[k].name}</option>`).join('')}
                        </select>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-1">Puntos Neum.</label>
                                <input id="ptsT" type="number" value="${state.calc.tPoints}" class="w-full p-3 rounded-xl text-center font-mono bg-zinc-900 border border-zinc-800">
                            </div>
                            <div>
                                <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-1">Puntos Fuel</label>
                                <input id="ptsF" type="number" value="${state.calc.fPoints}" class="w-full p-3 rounded-xl text-center font-mono bg-zinc-900 border border-zinc-800">
                            </div>
                        </div>
                    </div>
                </aside>
                <div class="lg:col-span-3 space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-ds uppercase tracking-tight">Sugerencias de estrategia</h2>
                        <button id="addStint" class="bg-yellow-600 text-black px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Añadir Stint</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${state.calc.stints.map((s, i) => {
                            const wear = getWear(state.calc.circuit, s.compound, s.laps, state.calc.tPoints);
                            const fuel = getFuel(state.calc.circuit, state.calc.fPoints, s.laps, s.boost);
                            return `
                            <div class="stint-card p-6 rounded-2xl relative">
                                <div class="flex justify-between mb-4 items-center">
                                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Stint ${i+1}</span>
                                    <button onclick="window.delS(${i})" class="text-zinc-800 hover:text-red-500 transition-colors">✕</button>
                                </div>
                                <div class="flex justify-center gap-3 mb-6">
                                    ${['SS','S','M','H'].map(c => `<button onclick="window.upS(${i},'compound','${c}')" class="tyre-btn compound-${c.toLowerCase()} ${s.compound===c?'active':''}"> ${c} </button>`).join('')}
                                </div>
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <input type="number" value="${s.laps}" onchange="window.upS(${i},'laps',this.value)" class="p-3 rounded-xl text-center font-mono text-xl text-white bg-black border border-zinc-800">
                                    <select onchange="window.upS(${i},'boost',this.value)" class="p-2 rounded-xl text-[10px] uppercase text-white bg-black border border-zinc-800">
                                        <option value="muy-alto" ${s.boost==='muy-alto'?'selected':''}>Empuje ++</option>
                                        <option value="neutral" ${s.boost==='neutral'?'selected':''}>Neutral</option>
                                        <option value="muy-bajo" ${s.boost==='muy-bajo'?'selected':''}>Empuje --</option>
                                    </select>
                                </div>
                                <div class="pt-4 border-t border-zinc-900 flex justify-between items-center">
                                    <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase mb-1">Vida Neum.</p><p class="text-xl font-mono ${wear<20?'text-red-500 animate-pulse':'text-green-500'} font-bold">${wear}%</p></div>
                                    <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase mb-1">Fuel</p><p class="text-xl font-mono text-blue-400 font-bold">${fuel}L</p></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderChat() {
            return `
            <div class="glass-panel rounded-3xl h-[70vh] flex flex-col overflow-hidden">
                <div class="p-4 bg-zinc-900 border-b border-zinc-800 flex justify-between items-center">
                    <span class="font-ds text-yellow-600 text-xs tracking-widest uppercase">Box Radio DS Automobiles</span>
                    <span class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span>
                </div>
                <div id="msgContainer" class="flex-grow p-6 overflow-y-auto space-y-4 no-scrollbar bg-black/40">
                    ${state.messages.map(m => `
                        <div class="flex flex-col ${m.user === state.username ? 'items-end' : 'items-start'}">
                            <span class="text-[9px] text-zinc-600 mb-1 uppercase font-black tracking-tighter">${m.user}</span>
                            <div class="bg-zinc-800/80 border border-zinc-700/50 px-5 py-2.5 rounded-2xl text-sm max-w-[80%] shadow-lg">${m.text}</div>
                        </div>
                    `).join('')}
                    ${state.messages.length === 0 ? '<div class="h-full flex items-center justify-center text-zinc-800 font-ds text-[10px] uppercase">Sin mensajes</div>' : ''}
                </div>
                <form id="chatInput" class="p-4 bg-black flex gap-2 border-t border-zinc-900">
                    <input name="msg" placeholder="Instrucciones al equipo..." class="flex-grow p-4 rounded-2xl outline-none text-sm text-white bg-zinc-900 border border-zinc-800" autocomplete="off">
                    <button class="bg-yellow-600 text-black px-8 rounded-2xl font-ds font-bold text-xs uppercase hover:bg-yellow-500 transition-all">Enviar</button>
                </form>
            </div>`;
        }

        function setupEvents() {
            const track = document.getElementById('selTrack');
            if(track) track.onchange = (e) => { state.calc.circuit = e.target.value; render(); };
            const pT = document.getElementById('ptsT');
            if(pT) pT.onchange = (e) => { state.calc.tPoints = parseInt(e.target.value); render(); };
            const pF = document.getElementById('ptsF');
            if(pF) pF.onchange = (e) => { state.calc.fPoints = parseInt(e.target.value); render(); };
            const add = document.getElementById('addStint');
            if(add) add.onclick = () => { state.calc.stints.push({compound:'M', laps:10, boost:'neutral'}); render(); };

            const chat = document.getElementById('chatInput');
            if(chat) chat.onsubmit = async (e) => {
                e.preventDefault();
                const text = e.target.msg.value.trim();
                if(!text) return;
                const id = Date.now();
                await set(ref(db, `chat/${id}`), {
                    user: state.username, text, timestamp: id,
                    time: new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})
                });
                e.target.msg.value = '';
            };
        }

        // LISTENERS DE FIREBASE (CONECTADOS A TU ESTRUCTURA)
        onValue(ref(db, 'perfiles'), (s) => { 
            state.users = s.val() || {}; 
            if(!state.isLoggedIn) render(); 
        });

        onValue(ref(db, 'chat'), (s) => {
            const data = s.val() || {};
            state.messages = Object.values(data).sort((a,b) => a.timestamp - b.timestamp);
            if(state.section === 'chat') {
                render();
                const container = document.getElementById('msgContainer');
                if(container) container.scrollTop = container.scrollHeight;
            }
        });

        render();
    </script>
</body>
</html>
