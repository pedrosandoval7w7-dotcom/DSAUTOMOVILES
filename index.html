<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DS Automobiles - Sugerencias de estrategia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --ds-gold: #c5a059; --ds-black: #050505; }
        body { background-color: var(--ds-black); color: #e4e4e7; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .font-ds { font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; }
        .glass-panel { background: rgba(20, 20, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.15); }
        .tyre-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; cursor: pointer; transition: all 0.2s; border: 2px solid rgba(0,0,0,0.5); }
        .tyre-btn.active { transform: scale(1.2); border-color: white; box-shadow: 0 0 15px currentColor; }
        .compound-ss { background: #ef4444; color: white; }
        .compound-s { background: #eab308; color: black; }
        .compound-m { background: #f4f4f5; color: black; }
        .compound-h { background: #f97316; color: white; }
        .nav-link.active { color: var(--ds-gold); border-bottom: 2px solid var(--ds-gold); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .chat-msg { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="app" class="flex flex-col h-full w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://ds-automobiles-f0a17-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const circuitsData = {
            "AUS": { name: "Australia", laps: 29, length: 5.27, tyreWear: 18 },
            "MAL": { name: "Malasia", laps: 28, length: 5.54, tyreWear: 22 },
            "CHN": { name: "China", laps: 28, length: 5.45, tyreWear: 20 },
            "BHR": { name: "Bahréin", laps: 29, length: 5.41, tyreWear: 24 },
            "ESP": { name: "España", laps: 33, length: 4.67, tyreWear: 25 },
            "MON": { name: "Mónaco", laps: 39, length: 3.33, tyreWear: 12 },
            "CAN": { name: "Canadá", laps: 35, length: 4.36, tyreWear: 15 },
            "AUT": { name: "Austria", laps: 36, length: 4.31, tyreWear: 19 },
            "GBR": { name: "Gran Bretaña", laps: 26, length: 5.89, tyreWear: 23 },
            "HUN": { name: "Hungría", laps: 35, length: 4.38, tyreWear: 21 },
            "BEL": { name: "Bélgica", laps: 22, length: 7.00, tyreWear: 22 },
            "ITA": { name: "Italia", laps: 27, length: 5.79, tyreWear: 18 },
            "SIN": { name: "Singapur", laps: 31, length: 5.06, tyreWear: 14 },
            "JPN": { name: "Japón", laps: 27, length: 5.80, tyreWear: 23 },
            "RUS": { name: "Rusia", laps: 27, length: 5.85, tyreWear: 16 },
            "USA": { name: "EE.UU.", laps: 28, length: 5.51, tyreWear: 18 },
            "MEX": { name: "México", laps: 36, length: 4.30, tyreWear: 19 },
            "BRA": { name: "Brasil", laps: 36, length: 4.30, tyreWear: 16 },
            "UAE": { name: "Abu Dhabi", laps: 28, length: 5.28, tyreWear: 17 },
            "AZE": { name: "Azerbaiyán", laps: 26, length: 6.00, tyreWear: 15 }
        };

        let state = {
            isLoggedIn: false, 
            authView: 'login', 
            username: '', 
            pendingUsername: '',
            section: 'strategy',
            users: {}, 
            messages: [],
            rankingTab: 'puntos', 
            showSync: false,
            calc: { circuit: 'AUS', tPoints: 100, fPoints: 100, stints: [{ compound: 'M', laps: 10, boost: '3' }] }
        };

        // --- CÁLCULOS VERIFICADOS (iGP Standards) ---
        function getWear(track, comp, laps, pts, boost) {
            const c = circuitsData[track];
            const boostMult = { '1': 0.85, '2': 0.92, '3': 1.0, '4': 1.12, '5': 1.25 }[boost];
            // Fórmula base de desgaste iGP escalada por longitud y puntos de diseño
            const baseW = (((pts/2.5)**-0.0778 * 1.43) * (0.00364 * c.tyreWear + 0.354) * (c.length * 1.384) * 150) / 100;
            const mults = { 'SS': 2.06, 'S': 1.32, 'M': 1.0, 'H': 0.65 };
            const wearPerLap = baseW * mults[comp] * boostMult;
            return Math.max(0, 100 * Math.exp(-1.18 * (wearPerLap / 100) * laps));
        }

        function getFuel(track, pts, laps, boost) {
            const c = circuitsData[track];
            const boostMult = { '1': 0.93, '2': 0.97, '3': 1.0, '4': 1.03, '5': 1.07 }[boost];
            return ((98.456 * Math.pow(pts, -0.088) * c.length) / 139.77) * laps * boostMult;
        }

        // --- RENDERIZADO ---
        function render() {
            const root = document.getElementById('app');
            if (!state.isLoggedIn) { renderAuth(root); return; }
            const isAdmin = state.username === 'admin';

            root.innerHTML = `
                <header class="bg-black border-b border-zinc-800 p-4 sticky top-0 z-50">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <h1 class="font-ds text-sm italic text-yellow-600 uppercase tracking-tighter">DS PERFORMANCE</h1>
                            <span class="text-[7px] bg-zinc-900 border border-zinc-800 px-1.5 py-0.5 rounded text-zinc-500 uppercase font-bold">${state.username}</span>
                        </div>
                        <nav class="flex gap-4">
                            <button onclick="window.go('strategy')" class="nav-link text-[10px] font-bold uppercase ${state.section==='strategy'?'active':''}">Estrategia</button>
                            <button onclick="window.go('ranking')" class="nav-link text-[10px] font-bold uppercase ${state.section==='ranking'?'active':''}">Ranking</button>
                            <button onclick="window.go('chat')" class="nav-link text-[10px] font-bold uppercase ${state.section==='chat'?'active':''}">Chat</button>
                        </nav>
                    </div>
                </header>
                <main class="p-4 flex-grow overflow-y-auto no-scrollbar pb-10">
                    ${renderSection(isAdmin)}
                </main>
                ${state.showSync ? renderSyncModal() : ''}
            `;
            attachEvents();
        }

        function renderSection(isAdmin) {
            if(state.section === 'ranking') return renderRanking(isAdmin);
            if(state.section === 'chat') return renderChat();
            
            // Cálculos del resumen total de stints
            const totalLaps = state.calc.stints.reduce((sum, s) => sum + parseInt(s.laps || 0), 0);
            const totalFuel = state.calc.stints.reduce((sum, s) => sum + getFuel(state.calc.circuit, state.calc.fPoints, s.laps, s.boost), 0);
            const trackLaps = circuitsData[state.calc.circuit].laps;

            return `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="glass-panel p-6 rounded-2xl h-fit space-y-6">
                        <div>
                            <label class="text-[9px] text-zinc-500 font-bold uppercase block mb-2">Circuito</label>
                            <select id="selTrack" class="w-full p-3 rounded-lg bg-zinc-900 border border-zinc-800 text-xs uppercase font-bold text-white">
                                ${Object.keys(circuitsData).map(k => `<option value="${k}" ${state.calc.circuit===k?'selected':''}>${circuitsData[k].name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="space-y-1">
                                <span class="text-[8px] text-zinc-600 uppercase font-bold ml-1">Diseño Neum.</span>
                                <input id="numT" type="number" value="${state.calc.tPoints}" class="w-full p-3 rounded-lg bg-black border border-zinc-800 text-center text-yellow-600 font-bold">
                            </div>
                            <div class="space-y-1">
                                <span class="text-[8px] text-zinc-600 uppercase font-bold ml-1">Diseño Comb.</span>
                                <input id="numF" type="number" value="${state.calc.fPoints}" class="w-full p-3 rounded-lg bg-black border border-zinc-800 text-center text-blue-400 font-bold">
                            </div>
                        </div>
                        
                        <!-- CONTADORES DE VUELTAS Y COMBUSTIBLE TOTALES RESTAURADOS -->
                        <div class="pt-4 border-t border-zinc-800">
                             <p class="text-[9px] text-zinc-500 uppercase font-bold mb-3">Resumen de Carrera (Total Stints)</p>
                             <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[18px] font-ds ${totalLaps > trackLaps ? 'text-red-500' : 'text-white'}">${totalLaps} / ${trackLaps}</p>
                                    <p class="text-[8px] text-zinc-600 uppercase">Vueltas Totales</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[18px] font-ds text-blue-400">${totalFuel.toFixed(1)}L</p>
                                    <p class="text-[8px] text-zinc-600 uppercase">Litros Totales</p>
                                </div>
                             </div>
                        </div>
                    </div>

                    <div class="lg:col-span-3 space-y-4">
                        <div class="flex justify-between items-center">
                            <h2 class="font-ds text-lg uppercase italic">Stints de Carrera</h2>
                            <button id="addStint" class="bg-yellow-600 text-black px-4 py-2 rounded-lg text-[10px] font-bold">AÑADIR STINT</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${state.calc.stints.map((s, i) => {
                                const wear = getWear(state.calc.circuit, s.compound, s.laps, state.calc.tPoints, s.boost);
                                const fuel = getFuel(state.calc.circuit, state.calc.fPoints, s.laps, s.boost);
                                return `
                                <div class="glass-panel p-5 rounded-xl border-l-4 border-yellow-600">
                                    <div class="flex justify-between mb-4"><span class="text-[9px] font-bold text-zinc-600 uppercase">Stint ${i+1}</span><button onclick="window.delS(${i})" class="text-zinc-700 hover:text-red-500">✕</button></div>
                                    <div class="flex justify-center gap-2 mb-4">
                                        ${['SS','S','M','H'].map(c => `<button onclick="window.upS(${i},'compound','${c}')" class="tyre-btn compound-${c.toLowerCase()} ${s.compound===c?'active':''}">${c}</button>`).join('')}
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div class="space-y-1 text-center"><span class="text-[7px] text-zinc-600 uppercase font-bold">Vueltas</span><input type="number" value="${s.laps}" onchange="window.upS(${i},'laps',this.value)" class="w-full p-2 rounded bg-black border border-zinc-800 text-center font-bold"></div>
                                        <div class="space-y-1 text-center"><span class="text-[7px] text-zinc-600 uppercase font-bold">Empuje</span>
                                            <select onchange="window.upS(${i},'boost',this.value)" class="w-full p-2 rounded bg-black border border-zinc-800 text-[10px] uppercase font-bold text-center">
                                                ${[1,2,3,4,5].map(v => `<option value="${v}" ${s.boost==v+''?'selected':''}>Nivel ${v}</option>`).join('')}
                                            </select>
                                        </div>
                                    </div>
                                    <div class="mt-4 pt-4 border-t border-zinc-900 flex justify-between">
                                        <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase font-bold">Vida Final</p><p class="font-bold text-lg ${wear<20?'text-red-500':'text-green-500'} font-ds">${wear.toFixed(1)}%</p></div>
                                        <div class="text-center"><p class="text-[8px] text-zinc-600 uppercase font-bold">Combustible</p><p class="font-bold text-lg text-blue-400 font-ds">${fuel.toFixed(2)}L</p></div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRanking(isAdmin) {
            const tabs = ['puntos', 'temporada', 'victorias', 'podios', 'poles', 'copas'];
            const list = Object.entries(state.users).map(([id, d]) => ({ id, ...d, score: d.stats?.[state.rankingTab] || 0 })).sort((a,b) => b.score - a.score);
            return `
                <div class="space-y-4">
                    <div class="flex justify-between items-center overflow-x-auto no-scrollbar gap-2 pb-2">
                        <div class="flex gap-1">${tabs.map(t => `<button onclick="window.setTab('${t}')" class="px-3 py-2 rounded bg-zinc-900 text-[9px] uppercase font-bold border border-zinc-800 ${state.rankingTab===t?'text-yellow-600 border-yellow-600':''} whitespace-nowrap">${t.replace('_',' ')}</button>`).join('')}</div>
                        ${isAdmin ? `<button onclick="window.toggleSync(true)" class="bg-blue-600 text-white px-3 py-2 rounded text-[9px] font-bold shrink-0">EXCEL</button>` : ''}
                    </div>
                    ${isAdmin ? `<form id="addM" class="flex gap-2 bg-zinc-900 p-3 rounded-xl border border-zinc-800"><input name="n" placeholder="NOMBRE MANAGER" class="flex-grow bg-black p-3 rounded-lg text-xs outline-none focus:border-yellow-600 border border-transparent" required><button class="bg-yellow-600 text-black px-6 rounded-lg font-bold text-[10px] uppercase">CREAR</button></form>` : ''}
                    <div class="glass-panel rounded-2xl overflow-x-auto border border-zinc-800/50">
                        <table class="w-full text-xs text-left min-w-[500px]">
                            <tr class="bg-zinc-900 text-zinc-500 uppercase text-[9px]"><th class="p-4">Pos</th><th class="p-4">Manager</th><th class="p-4 text-right">${state.rankingTab}</th>${isAdmin?'<th class="p-4 text-center">Gestión</th>':''}</tr>
                            ${list.map((u, i) => `
                                <tr class="border-b border-zinc-900/50 hover:bg-zinc-900/20">
                                    <td class="p-4 font-bold text-zinc-600">#${i+1}</td>
                                    <td class="p-4 uppercase font-bold">${u.id} ${u.password==='ext'?'<span class="text-[7px] text-blue-400 ml-2 italic">Invitado</span>':''}</td>
                                    <td class="p-4 text-right text-yellow-600 font-bold font-ds text-sm">${u.score}</td>
                                    ${isAdmin ? `<td class="p-4 text-center"><div class="flex items-center justify-center gap-2"><input id="in_${u.id}" type="number" class="w-14 bg-black border border-zinc-800 rounded p-1.5 text-center text-[10px]" placeholder="+0"><button onclick="window.addPoints('${u.id}')" class="bg-green-600 text-white px-3 py-1.5 rounded text-[10px]">Sumar</button><button onclick="window.delUser('${u.id}')" class="text-zinc-700 ml-2">✕</button></div></td>` : ''}
                                </tr>`).join('')}
                        </table>
                    </div>
                </div>`;
        }

        function renderChat() {
            return `
                <div class="flex flex-col h-[70vh] glass-panel rounded-2xl overflow-hidden border border-zinc-800">
                    <div id="chatBox" class="flex-grow p-4 overflow-y-auto space-y-4 no-scrollbar">
                        ${state.messages.map(m => `
                            <div class="chat-msg ${m.u === state.username ? 'ml-auto text-right' : ''}">
                                <p class="text-[8px] font-bold text-zinc-600 uppercase mb-1">${m.u}</p>
                                <div class="inline-block p-3 rounded-2xl text-xs ${m.u === state.username ? 'bg-yellow-600 text-black rounded-tr-none' : 'bg-zinc-900 text-white rounded-tl-none border border-zinc-800'}">
                                    ${m.t}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <form id="chatF" class="p-4 bg-zinc-900 border-t border-zinc-800 flex gap-2">
                        <input name="m" placeholder="Mensaje de equipo..." class="flex-grow bg-black p-3 rounded-xl text-xs outline-none focus:border-yellow-600" autocomplete="off">
                        <button class="bg-yellow-600 text-black px-6 rounded-xl font-bold text-[10px]">ENVIAR</button>
                    </form>
                </div>
            `;
        }

        function renderSyncModal() {
            const url = `https://ds-automobiles-f0a17-default-rtdb.firebaseio.com/perfiles.json?print=pretty`;
            return `<div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6"><div class="glass-panel p-8 rounded-3xl max-w-sm w-full text-center"><h3 class="font-ds text-white mb-4 italic">CONEXIÓN EXCEL</h3><div class="bg-black p-4 rounded-xl border border-zinc-800 mb-6 overflow-x-auto"><code class="text-[9px] text-blue-400 break-all select-all font-mono">=IMPORTDATA("${url}")</code></div><button onclick="window.toggleSync(false)" class="w-full py-4 rounded-xl bg-zinc-900 text-white text-[10px] font-bold uppercase">CERRAR</button></div></div>`;
        }

        function renderAuth(root) {
            if (state.authView === 'first_time') { renderFirstTimeSetup(root); return; }
            const isL = state.authView === 'login';
            root.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-black">
                    <div class="glass-panel w-full max-w-xs p-10 rounded-[2.5rem] border-t-2 border-yellow-600 text-center">
                        <h2 class="font-ds text-2xl text-white italic tracking-tighter mb-8">DS PERFORMANCE</h2>
                        <form id="authF" class="space-y-4">
                            <input name="u" placeholder="USUARIO" class="w-full p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800 text-white uppercase text-xs outline-none">
                            <input name="p" type="password" placeholder="CONTRASEÑA" class="w-full p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800 text-white text-xs outline-none">
                            <button class="w-full bg-yellow-600 text-black py-4 rounded-2xl font-bold uppercase text-[10px] mt-2">${isL?'ENTRAR':'REGISTRAR'}</button>
                        </form>
                        <button onclick="window.switchA()" class="mt-8 text-[9px] text-zinc-500 uppercase font-bold">${isL?'Crear cuenta':'Volver al login'}</button>
                    </div>
                </div>`;
            document.getElementById('authF').onsubmit = async (e) => {
                e.preventDefault();
                const u = e.target.u.value.trim().toLowerCase();
                const p = e.target.p.value;
                const snap = await get(ref(db, `perfiles/${u}`));
                
                if(isL) {
                    if(snap.exists()) {
                        const data = snap.val();
                        // SI ES INVITADO (PASSWORD === 'EXT'), FORZAR CONFIGURACIÓN DE CONTRASEÑA
                        if(data.password === 'ext') { 
                            state.pendingUsername = u; 
                            state.authView = 'first_time'; 
                            render(); 
                        }
                        else if(data.password === p) { 
                            state.username = u; 
                            state.isLoggedIn = true; 
                            render(); 
                        }
                        else alert("Contraseña incorrecta");
                    } else alert("El usuario no existe");
                } else {
                    if(snap.exists() && snap.val().password !== 'ext') alert("El usuario ya está registrado");
                    else { 
                        await set(ref(db, `perfiles/${u}`), { 
                            password: p, 
                            stats: snap.exists() ? snap.val().stats : { puntos:0, temporada:0, victorias:0, podios:0, poles:0, copas:0 } 
                        }); 
                        state.authView = 'login'; 
                        render(); 
                    }
                }
            };
        }

        function renderFirstTimeSetup(root) {
            root.innerHTML = `<div class="min-h-screen flex items-center justify-center p-6 bg-black"><div class="glass-panel w-full max-w-xs p-10 rounded-[2.5rem] border-t-2 border-blue-500 text-center"><h2 class="font-ds text-xl text-white mb-2 uppercase italic">Activar Cuenta</h2><p class="text-[9px] text-zinc-500 mb-6 font-bold uppercase">Manager: ${state.pendingUsername}</p><form id="setupF" class="space-y-4"><input id="newPass" type="password" placeholder="NUEVA CONTRASEÑA" class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-white text-xs outline-none"><input id="newPass2" type="password" placeholder="CONFIRMAR CONTRASEÑA" class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-white text-xs outline-none"><button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase text-[10px] mt-2">CONFIGURAR Y ENTRAR</button></form></div></div>`;
            document.getElementById('setupF').onsubmit = async (e) => {
                e.preventDefault();
                const p1 = document.getElementById('newPass').value;
                if(p1.length < 4) return alert("Contraseña muy corta");
                if(p1 !== document.getElementById('newPass2').value) return alert("No coinciden");
                await update(ref(db, `perfiles/${state.pendingUsername}`), { password: p1 });
                state.username = state.pendingUsername;
                state.isLoggedIn = true;
                render();
            };
        }

        // --- HANDLERS ---
        window.go = (s) => { state.section = s; render(); };
        window.upS = (i, k, v) => { state.calc.stints[i][k] = v; render(); };
        window.delS = (i) => { state.calc.stints.splice(i, 1); render(); };
        window.setTab = (t) => { state.rankingTab = t; render(); };
        window.toggleSync = (v) => { state.showSync = v; render(); };
        window.switchA = () => { state.authView = state.authView === 'login' ? 'register' : 'login'; render(); };
        
        window.addPoints = async (id) => {
            const input = document.getElementById(`in_${id}`);
            const val = parseInt(input.value) || 0;
            const cur = state.users[id].stats?.[state.rankingTab] || 0;
            await update(ref(db, `perfiles/${id}/stats`), { [state.rankingTab]: cur + val });
            input.value = '';
        };

        window.delUser = async (id) => { if(confirm("¿Seguro que quieres eliminar a este manager?")) await set(ref(db, `perfiles/${id}`), null); };

        function attachEvents() {
            if(document.getElementById('selTrack')) document.getElementById('selTrack').onchange = (e) => { state.calc.circuit = e.target.value; render(); };
            if(document.getElementById('numT')) document.getElementById('numT').onchange = (e) => { state.calc.tPoints = e.target.value; render(); };
            if(document.getElementById('numF')) document.getElementById('numF').onchange = (e) => { state.calc.fPoints = e.target.value; render(); };
            if(document.getElementById('addStint')) document.getElementById('addStint').onclick = () => { state.calc.stints.push({ compound: 'M', laps: 5, boost: '3' }); render(); };
            
            if(document.getElementById('addM')) {
                document.getElementById('addM').onsubmit = async (e) => {
                    e.preventDefault();
                    const n = e.target.n.value.trim().toLowerCase();
                    if(n && !state.users[n]) {
                        await set(ref(db, `perfiles/${n}`), { 
                            password: 'ext', 
                            stats: { puntos:0, temporada:0, victorias:0, podios:0, poles:0, copas:0 } 
                        });
                    } else if(state.users[n]) {
                        alert("Ese manager ya existe");
                    }
                    e.target.reset();
                };
            }
            
            if(document.getElementById('chatF')) {
                document.getElementById('chatF').onsubmit = async (e) => {
                    e.preventDefault();
                    const t = e.target.m.value.trim();
                    if(t) { 
                        await push(ref(db, 'chat'), { 
                            u: state.username, 
                            t, 
                            ts: serverTimestamp() 
                        }); 
                        e.target.reset(); 
                    }
                };
            }
            
            const chatBox = document.getElementById('chatBox');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- LISTENERS ---
        onValue(ref(db, 'perfiles'), (s) => { state.users = s.val() || {}; render(); });
        onValue(ref(db, 'chat'), (s) => { 
            const data = s.val() || {};
            state.messages = Object.values(data).sort((a,b) => a.ts - b.ts).slice(-60);
            if(state.section === 'chat') render(); 
        });

        render();
    </script>
</body>
</html>
