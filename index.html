        // --- ALGORITMOS MATEMÁTICOS INTACTOS ---
        function getWear(track, comp, laps, pts, boost) {
            const c = circuitsData[track];
            const boostMult = { '1': 0.85, '2': 0.92, '3': 1.0, '4': 1.12, '5': 1.25 }[boost] || 1.0;
            const tyreFactors = { 'SS': 1.5, 'S': 1.2, 'M': 1.0, 'H': 0.8 };
            const teFactor = 1.29 * Math.pow(pts, -0.07);
            const trackFactor = (c.tyreWear * 0.005 + 0.5) * c.length;
            const wearPerLap = trackFactor * tyreFactors[comp] * boostMult * teFactor * 1.734; 
            return Math.max(0, 100 - (wearPerLap * laps)); 
        }

        function getFuel(track, pts, laps, boost) {
            const c = circuitsData[track];
            const pushAdj = { '5': 0.02, '4': 0.01, '3': 0, '2': -0.004, '1': -0.007 }[boost] || 0;
            const baseFuelPerKm = 0.6983736841 * Math.pow(pts, -0.08510976572);
            return (baseFuelPerKm + pushAdj) * c.length * laps;
        }

        function getSetupForTier(track, height, tier) {
            const base = setupCircuits[tier][track];
            if (!base) return { r:0, w:0, s:0 };
            const key = Object.keys(setupScale).sort((a,b)=>b-a).find(k => parseInt(k) <= height);
            const adj = key ? setupScale[key][tier] : 0;
            return { r: Math.max(1, base.r + adj), w: Math.max(1, base.w), s: Math.max(1, base.s) };
        }

        // --- FUNCIÓN DE CLIMA EN VIVO (OPEN-METEO) ---
        window.fetchWeather = async (trackCode) => {
            state.weather = 'loading';
            state.forecast = null;
            const wDiv = document.getElementById('weatherWidget');
            if(wDiv) wDiv.innerHTML = getWeatherDisplay(state.weather);
            
            const track = circuitsData[trackCode];
            if (!track || !track.lat) return;
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${track.lat}&longitude=${track.lon}&current_weather=true&hourly=temperature_2m,precipitation_probability&timezone=auto`);
                const data = await res.json();
                if (data && data.current_weather) {
                    state.weather = {
                        temp: data.current_weather.temperature,
                        code: data.current_weather.weathercode
                    };
                    state.forecast = {
                        times: data.hourly.time.slice(0, 24).map(t => t.split('T')[1]),
                        temps: data.hourly.temperature_2m.slice(0, 24),
                        rains: data.hourly.precipitation_probability.slice(0, 24)
                    };
                    if(document.getElementById('weatherWidget')) {
                        document.getElementById('weatherWidget').innerHTML = getWeatherDisplay(state.weather);
                    }
                    if(state.section === 'strategy' && window.drawWeatherChart) {
                        window.drawWeatherChart();
                    }
                }
            } catch(e) {
                console.error("Weather fetch error", e);
                state.weather = { error: true };
                if(document.getElementById('weatherWidget')) {
                    document.getElementById('weatherWidget').innerHTML = getWeatherDisplay(state.weather);
                }
            }
        };

        function getWeatherDisplay(weather) {
            if (!weather || weather === 'loading') return '<span class="animate-pulse text-zinc-500 font-bold">📡 Conectando al radar meteorológico...</span>';
            if (weather.error) return '<span class="text-red-500 font-bold">❌ Error conectando al radar</span>';
            
            const code = weather.code;
            let icon = '☀️'; let text = 'Despejado';
            if(code >= 1 && code <= 3) { icon = '⛅'; text = 'Nublado'; }
            if(code >= 45 && code <= 48) { icon = '🌫️'; text = 'Niebla'; }
            if(code >= 51 && code <= 67) { icon = '🌧️'; text = 'Lluvia'; }
            if(code >= 71 && code <= 77) { icon = '❄️'; text = 'Nieve'; }
            if(code >= 80 && code <= 82) { icon = '🌦️'; text = 'Chubascos'; }
            if(code >= 95) { icon = '⛈️'; text = 'Tormenta'; }

            return `<span class="text-xl mr-2">${icon}</span> <span class="text-white font-ds font-bold">${weather.temp}°C</span> <span class="text-zinc-400 ml-2 uppercase tracking-widest text-[10px] font-bold">${text}</span>`;
        }

        function renderRanking(isAdmin) {

                .filter(([id, d]) => d.stats && d.stats[state.rankingTab] !== undefined && d.stats[state.rankingTab] !== null)

                            ${listWithTrends.map((u, i) => {
                                let trendIcon = '<span class="text-orange-500 text-[10px] ml-1.5 font-black" title="Mantiene Posición">-</span>';

                                if (u.trend === 1) {
                                    trendIcon = '<span class="text-green-500 text-[10px] ml-1.5 font-black" title="Sube Posición">▲</span>';
                                    rowBgStyle = 'background-color: rgba(34, 197, 94, 0.15);';

                                    trendIcon = '<span class="text-red-500 text-[10px] ml-1.5 font-black" title="Baja Posición">▼</span>';
                                    rowBgStyle = 'background-color: rgba(239, 68, 68, 0.15);';
                                }

                                const safeDomId = 'in_' + u.id.replace(/[^a-zA-Z0-9]/g, '_');
                                const safeNameParam = u.id.replace(/'/g, "\\'");
                                
                                let difText = "-";
                                if (i > 0) {
                                    const diff = listWithTrends[i-1].score - u.score;

                                return `

                                    <td class="p-5 text-center text-zinc-400 font-ds text-[10px]">${difText}</td>
                                    <td class="p-5 text-right text-yellow-600 font-bold font-ds text-sm">${u.score}</td>
                                    ${isAdmin ? `

                                        <button onclick="window.removeStat('${safeNameParam}')" class="text-zinc-700 hover:text-red-500 w-6 h-6 transition-colors" title="Quitar de esta lista">✕</button>
                                    </td>` : ''}
                                </tr>`;
                            }).join('')}
                        </table>

                    <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl mt-8 border-t border-[#c5a059]/30">

                            <div class="flex gap-2 w-full md:w-auto items-center">

                                </form>
                                <button onclick="window.archiveSeason()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-[9px] font-bold uppercase transition-colors hover:bg-blue-500 whitespace-nowrap">
                                    ARCHIVAR TEMPORADA
                                </button>
                                ` : ''}
                            </div>
                        </div>
                        <div class="overflow-x-auto no-scrollbar pb-2">

                                    <tr class="border-b border-zinc-800 text-zinc-600 font-bold uppercase tracking-[0.2em]">

                                        ${Object.keys(circuitsData).map(tc => {

                                                    </div>
                                                    
                                                    ${isAdmin ? `<input type="text" placeholder="Ej: mex p2" onkeydown="window.quickCommand(event, '${safeNameParam}')" class="bg-black border border-zinc-800 text-[8px] p-1.5 rounded text-zinc-300 outline-none w-20 focus:border-yellow-600 uppercase placeholder-zinc-700">` : ''}
                                                </div>
                                            </td>
                                            ${Object.keys(circuitsData).map(tc => {
                                                const res = u.pizarra && u.pizarra[tc] ? u.pizarra[tc] : '-';

                                                if(res === 'P1') color = 'text-yellow-500 drop-shadow-[0_0_5px_rgba(234,179,8,0.5)] text-sm';
                                                else if(res.startsWith('P') && res.length <= 3) color = 'text-zinc-200';
                                                else if(res === 'DNF') color = 'text-red-500';
                                                
                                                const clickEvent = isAdmin ? `onclick="window.setTrackResult('${safeNameParam}', '${tc}')" class="cursor-pointer hover:bg-zinc-800 rounded transition-colors"` : '';
                                                return `<td class="p-3 font-ds ${color}" ${clickEvent}>${res}</td>`;
                                            }).join('')}
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;

            if(!u) return '';

            let historyHtml = '<p class="text-zinc-500 text-[10px] uppercase font-bold text-center py-4">No hay temporadas archivadas aún.</p>';
            if (u.historial && Object.keys(u.historial).length > 0) {
                historyHtml = Object.entries(u.historial).map(([tempName, tracks]) => {
                    const tracksHtml = Object.entries(tracks).map(([tc, res]) => {
                        const colorClass = res === 'P1' ? 'text-yellow-500 drop-shadow-[0_0_3px_rgba(234,179,8,0.5)]' : (res === 'DNF' ? 'text-red-500' : 'text-zinc-300');
                        const fc = flagCodes[tc] || 'un';
                        return `
                            <div class="bg-zinc-900/50 p-2 rounded-lg border border-zinc-800 flex justify-between items-center">
                                <div class="flex items-center gap-1.5">

                                <span class="font-ds text-[10px] font-bold ${colorClass}">${res}</span>

                            ${historyHtml}

                    </div>
                </div>

        function renderChat() {
            return `<div class="flex flex-col h-[70vh] glass-panel rounded-3xl overflow-hidden border border-zinc-800"><div id="chatBox" class="flex-grow p-5 overflow-y-auto space-y-4 no-scrollbar">
                ${state.messages.map(m => `<div class="flex flex-col ${m.u === state.username ? 'items-end' : 'items-start'}"><span class="text-[7px] font-bold text-zinc-600 uppercase mb-1 ml-1 mr-1">${m.u}</span><div class="p-3.5 rounded-2xl text-xs max-w-[80%] ${m.u === state.username ? 'bg-yellow-600 text-black' : 'bg-zinc-900 text-white border border-zinc-800'}">${m.t}</div></div>`).join('')}
                </div><form id="chatF" class="p-4 bg-zinc-900/80 border-t border-zinc-800/50 flex gap-2"><input name="m" placeholder="Escribe al equipo..." class="flex-grow bg-black p-3.5 rounded-2xl text-xs outline-none focus:border-yellow-600 text-white" autocomplete="off"><button class="bg-yellow-600 text-black px-6 rounded-2xl font-bold text-[10px] uppercase">Enviar</button></form></div>`;
        }

        function renderSyncModal() {
            const url = `https://ds-automobiles-f0a17-default-rtdb.firebaseio.com/perfiles.json?print=pretty`;
            return `<div class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-sm"><div class="glass-panel p-8 rounded-[2.5rem] max-w-sm w-full text-center border-yellow-600/30"><h3 class="font-ds text-white mb-2 italic uppercase">Sincronización Total</h3><div class="bg-black p-4 rounded-2xl border border-zinc-800 mb-6"><code class="text-[9px] text-blue-400 break-all select-all font-mono">=IMPORTDATA("${url}")</code></div><button onclick="window.toggleSync(false)" class="w-full py-4 rounded-2xl bg-zinc-900 text-white text-[10px] font-bold uppercase border border-zinc-800">Cerrar</button></div></div>`;
        }

        window.go = (s) => { state.section = s; render(); };
        window.upS = (i, k, v) => { state.calc.stints[i][k] = v; render(); };
        window.delS = (i) => { state.calc.stints.splice(i, 1); render(); };
        window.setTab = (t) => { state.rankingTab = t; render(); };
        window.toggleSync = (v) => { state.showSync = v; render(); };
        window.back = () => { state.step = 1; render(); };
        window.upSetupH = (v) => { state.setupCalc.height = parseInt(v) || 175; render(); };

        window.copyRadio = () => {
            const c = circuitsData[state.calc.circuit];
            const pits = Math.max(0, state.calc.stints.length - 1);
            let text = `🏁 DS Estrategia: ${c.name} 🏁\n\n`;
            
            state.calc.stints.forEach((s, i) => {
                text += `Stint ${i+1}: Neumático ${s.compound} | ${s.laps} vueltas | Nivel ${s.boost}\n`;
            });
            
            const fuel = state.calc.stints.reduce((sum, s) => sum + getFuel(state.calc.circuit, state.calc.fPoints, s.laps, s.boost), 0);
            text += `\n⛽ Combustible Total: ${fuel.toFixed(1)}L\n`;
            text += `⏱️ Paradas en Pits: ${pits} (~${pits * c.pitTime} seg)\n`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("¡Estrategia copiada para WhatsApp/Discord!");
            });
        };

        window.quickCommand = async (e, managerId) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim().toLowerCase();
                const parts = val.split(' ');
                
                if (parts.length >= 2) {
                    const searchTrack = parts[0];
                    const result = parts[1].toUpperCase();
                    
                    let matchedCode = null;
                    for (const code of Object.keys(circuitsData)) {
                        if (code.toLowerCase().includes(searchTrack) || circuitsData[code].name.toLowerCase().includes(searchTrack)) {
                            matchedCode = code;
                            break;
                        }
                    }
                    
                    if (matchedCode) {
                        await update(ref(db, `perfiles/${managerId}/pizarra`), { [matchedCode]: result });
                        e.target.value = ''; 
                    } else {
                        alert(`Circuito no encontrado: "${searchTrack}". Usa códigos como 'mex', 'mon', 'aze'.`);
                    }
                }
            }
        };

        window.wearChartInst = null;
        window.drawWearChart = () => {
            const ctx = document.getElementById('wearChart');
            if(!ctx) return;
            if(window.wearChartInst) window.wearChartInst.destroy();

            let labels = [0];
            let dataPoints = [100];
            let currentLap = 0;
            let colors = [];
            
            const typeColors = { 'SS': '#ef4444', 'S': '#eab308', 'M': '#f4f4f5', 'H': '#f97316' };

            state.calc.stints.forEach((s, idx) => {
                const totalWear = 100 - getWear(state.calc.circuit, s.compound, s.laps, state.calc.tPoints, s.boost);
                const wearPerLap = totalWear / (s.laps || 1);
                let currentWear = 100;

                for(let i = 1; i <= s.laps; i++){
                    currentLap++;
                    currentWear -= wearPerLap;
                    labels.push(currentLap);
                    dataPoints.push(Math.max(0, currentWear));
                    colors.push(typeColors[s.compound] || '#fff');
                }
                
                if(idx < state.calc.stints.length - 1) {
                    labels.push('PIT');
                    dataPoints.push(100);
                    colors.push('#000');
                }
            });

            window.wearChartInst = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Vida %',
                        data: dataPoints,
                        borderColor: '#c5a059',
                        borderWidth: 2,
                        pointBackgroundColor: ['#c5a059', ...colors],
                        pointBorderColor: '#000',
                        pointRadius: 4,
                        fill: true,
                        backgroundColor: 'rgba(197, 160, 89, 0.1)',
                        tension: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#27272a' }, ticks: { color: '#a1a1aa', font: {size: 9} } },
                        x: { grid: { color: '#27272a' }, ticks: { color: '#a1a1aa', font: {size: 9} } }
                    },
                    plugins: { legend: { display: false }, tooltip: { padding: 10, bodyFont: { size: 10 } } }
                }
            });
        };

        window.weatherChartInst = null;
        window.drawWeatherChart = () => {
            const ctx = document.getElementById('weatherChart');
            if(!ctx || !state.forecast) return;
            if(window.weatherChartInst) window.weatherChartInst.destroy();
            
            const track = circuitsData[state.calc.circuit];
            const latStr = track.lat >= 0 ? `${track.lat}°N` : `${Math.abs(track.lat)}°S`;
            const lonStr = track.lon >= 0 ? `${track.lon}°E` : `${Math.abs(track.lon)}°W`;
            const subtitle = `${state.weather.temp}°C - ${track.name} ${latStr} ${lonStr}`;

            window.weatherChartInst = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.forecast.times,
                    datasets: [
                        { 
                            label: 'temperature', 
                            data: state.forecast.temps, 
                            borderColor: '#ef4444', 
                            borderWidth: 1.5, 
                            yAxisID: 'y', 
                            tension: 0.4, 
                            pointRadius: 0 
                        },
                        { 
                            label: 'precipitation', 
                            data: state.forecast.rains, 
                            backgroundColor: '#22d3ee', 
                            borderColor: 'transparent',
                            fill: true, 
                            yAxisID: 'y1', 
                            type: 'line', 
                            pointRadius: 0, 
                            borderWidth: 0,
                            tension: 0 // Esto hace los picos triangulares exactos de la foto
                        }
                    ]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: true, position: 'right', labels: { color: '#a1a1aa', boxWidth: 10, font: { size: 9 } } },
                        title: { display: true, text: subtitle, color: '#71717a', font: { size: 10, weight: 'normal' }, padding: { top: 0, bottom: 10 } }
                    },
                    scales: {
                        y: { position: 'left', grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { display: false } },
                        y1: { position: 'right', min: 0, max: 100, grid: { display: false, drawBorder: false }, ticks: { display: false } },
                        x: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#71717a', font:{size:9}, maxRotation: 0, maxTicksLimit: 12 } }
                    }
                }
            });
        };

        const updateGlobalRanking = async (tab, id, action, val = 0) => {
            let scores = {}; Object.entries(state.users).forEach(([uid, d]) => { if (d.stats && d.stats[tab] !== undefined) scores[uid] = parseFloat(d.stats[tab]); });
            const oldSorted = Object.keys(scores).sort((a,b) => scores[b] - scores[a]);
            if (action === 'add') scores[id] = (scores[id] || 0) + val; else if (action === 'remove') delete scores[id];
            const newSorted = Object.keys(scores).sort((a,b) => scores[b] - scores[a]);
            let updates = {};
            newSorted.forEach((uid, ni) => { const oi = oldSorted.indexOf(uid); let trend = 0; if (oi !== -1) { if (oi > ni) trend = 1; else if (oi < ni) trend = -1; } updates[`perfiles/${uid}/stats/trend_${tab}`] = trend; });
            if (action === 'add') updates[`perfiles/${id}/stats/${tab}`] = scores[id];
            else if (action === 'remove') { updates[`perfiles/${id}/stats/${tab}`] = null; updates[`perfiles/${id}/stats/trend_${tab}`] = null; }
            await update(ref(db), updates);
        };

        window.addPoints = async (id) => { const inp = document.getElementById(`in_${id}`); const val = parseFloat(inp.value) || 0; if(val===0) return; await updateGlobalRanking(state.rankingTab, id, 'add', val); inp.value = ''; };
        window.resetPass = async (id) => { if(confirm(`¿Resetear pass de ${id}?`)) await update(ref(db, `perfiles/${id}`), { password: 'ext' }); };
        window.removeStat = async (id) => { if(confirm(`¿Quitar a ${id} de esta lista?`)) await updateGlobalRanking(state.rankingTab, id, 'remove'); };
        window.clearStat = async (id) => { if(confirm(`¿Poner a 0 la lista de ${state.rankingTab} para ${id}?`)) await updateGlobalRanking(state.rankingTab, id, 'clear'); };
        
        window.archiveSeason = async () => {
            if(!confirm("¿Estás seguro de archivar la temporada actual? Esto guardará la pizarra en el historial de cada piloto y la dejará en blanco para el nuevo campeonato.")) return;
            let updates = {};
            Object.entries(state.users).forEach(([uid, u]) => {
                const currentTemp = u.stats?.temporada || 1;
                if (u.pizarra) {
                    updates[`perfiles/${uid}/historial/Temporada ${currentTemp}`] = u.pizarra;
                    updates[`perfiles/${uid}/pizarra`] = null;
                }
                updates[`perfiles/${uid}/stats/temporada`] = currentTemp + 1;
            });
            await update(ref(db), updates);
            alert("¡Temporada archivada con éxito en los historiales de los pilotos!");
        };

        window.setTrackResult = async (managerId, trackCode) => {
            const currentRes = (state.users[managerId].pizarra && state.users[managerId].pizarra[trackCode]) ? state.users[managerId].pizarra[trackCode] : '';
            const res = prompt(`RESULTADO PARA ${managerId.toUpperCase()} EN [${trackCode.toUpperCase()}]\nEjemplos: P1, P2, DNF, -`, currentRes);
            if (res !== null) {
                const resultStr = res.toUpperCase().trim();
                await update(ref(db, `perfiles/${managerId}/pizarra`), { [trackCode]: resultStr });
            }
        };

        window.removeBoard = async (id) => {
            if(confirm(`¿Ocultar a ${id} de la Pizarra de Temporada? Sus estadísticas globales no se borrarán.`)) {
                await update(ref(db, `perfiles/${id}`), { hidePizarra: true });
            }
        };
        
        window.openChart = (id) => { state.chartUser = id; state.compareUser = ''; render(); setTimeout(() => window.drawChart(id), 50); };
        window.updateCompare = (rivalId) => { state.compareUser = rivalId; window.drawChart(state.chartUser, rivalId); };
        window.closeChart = () => { state.chartUser = null; render(); };
        window.drawChart = (id, compareId = state.compareUser) => {
            const container = document.getElementById('statsBarsContainer'); if(!container) return;
            const userData = state.users[id]; const allUsers = Object.values(state.users);
            const getAvg = (stat) => allUsers.reduce((sum, u) => sum + (parseFloat(u.stats?.[stat]) || 0), 0) / (allUsers.length || 1);
            const statsToCompare = ['puntos', 'victorias', 'podios', 'poles', 'copas'];
            let rivalData = {}; let rivalColor = compareId ? '#3b82f6' : '#64748b'; 
            if (compareId && state.users[compareId]) { rivalData = state.users[compareId].stats; } else { statsToCompare.forEach(stat => rivalData[stat] = getAvg(stat)); }
            let html = ''; statsToCompare.forEach(stat => {
                const val1 = parseFloat(userData.stats[stat]) || 0; const val2 = parseFloat(rivalData[stat]) || 0;
                const total = val1 + val2; let pct1 = total > 0 ? (val1 / total) * 100 : 0; let pct2 = total > 0 ? (val2 / total) * 100 : 0;
                html += `<div class="w-full mb-3"><div class="flex justify-between items-end mb-1 px-1"><span class="text-[#c5a059] font-ds text-xs font-bold">${val1}</span><span class="text-[8px] text-zinc-500 uppercase font-bold">${stat}</span><span style="color: ${rivalColor}" class="font-ds font-bold text-sm">${val2.toFixed(compareId?0:1)}</span></div><div class="h-2.5 w-full bg-zinc-900 rounded-full overflow-hidden border border-zinc-800 shadow-inner"><div class="bg-[#c5a059] h-full transition-all duration-1000" style="width: ${pct1}%"></div><div style="background-color: ${rivalColor}; width: ${pct2}%" class="transition-all duration-1000"></div></div></div>`;
            });
            container.innerHTML = html;
        };

        function attachEvents() {
            if(document.getElementById('selTrack')) {
                document.getElementById('selTrack').onchange = (e) => { 
                    state.calc.circuit = e.target.value; 
                    render(); 
                    window.fetchWeather(state.calc.circuit); // Actualiza clima al cambiar pista
                }; 
            }
            if(document.getElementById('numT')) document.getElementById('numT').onchange = (e) => { state.calc.tPoints = e.target.value; render(); };
            if(document.getElementById('numF')) document.getElementById('numF').onchange = (e) => { state.calc.fPoints = e.target.value; render(); };
            if(document.getElementById('addStint')) document.getElementById('addStint').onclick = () => { state.calc.stints.push({ compound: 'M', laps: 5, boost: '3' }); render(); };
            
            if(document.getElementById('addBoardM')) {
                document.getElementById('addBoardM').onsubmit = async (e) => {
                    e.preventDefault();
                    const n = e.target.n.value.trim().toLowerCase();
                    if(n && !state.users[n]) {
                        await set(ref(db, `perfiles/${n}`), { 
                            password: 'ext', 
                            stats: { puntos:0, temporada:1, victorias:0, podios:0, poles:0, copas:0 },
                            pizarra: {},
                            historial: {}
                        });
                    } else if(state.users[n]) {
                        if (state.users[n].hidePizarra) {
                            await update(ref(db, `perfiles/${n}`), { hidePizarra: null });
                            alert("El manager ha sido restaurado en la pizarra.");
                        } else {
                            alert("Este manager ya existe y está en la pizarra.");
                        }
                    }
                    e.target.reset();
                };
            }

            if(document.getElementById('addM')) { document.getElementById('addM').onsubmit = async (e) => { e.preventDefault(); const n = e.target.n.value.trim().toLowerCase(); if(n) await set(ref(db, `perfiles/${n}`), { password: 'ext', stats: { puntos:0, temporada:1, victorias:0, podios:0, poles:0, copas:0 } }); e.target.reset(); }; }
            if(document.getElementById('chatF')) { document.getElementById('chatF').onsubmit = async (e) => { e.preventDefault(); const t = e.target.m.value.trim(); if(t){ await push(ref(db, 'chat'), { u: state.username, t, ts: serverTimestamp() }); e.target.reset(); } }; }
            const chatBox = document.getElementById('chatBox'); if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        onValue(ref(db, 'perfiles'), (s) => { state.users = s.val() || {}; render(); });
        onValue(ref(db, 'chat'), (s) => { const data = s.val() || {}; state.messages = Object.values(data).sort((a,b) => a.ts - b.ts).slice(-50); if(state.section === 'chat') render(); });
        
        // Arranca con la petición de clima para el circuito por defecto
        render();
    </script>
</body>
</html>
